<button
  [attr.type]="type"
  [disabled]="disabled || loading"
  [ngClass]="classes"
  (click)="handleClick($event)"
>
  <span *ngIf="loading" class="ui-btn__spinner"></span>

  <span *ngIf="iconLeft && !loading" class="ui-btn__icon">
    <i [class]="iconLeft"></i>
  </span>

  <span class="ui-btn__label">
    <ng-content></ng-content>
  </span>

  <span *ngIf="iconRight && !loading" class="ui-btn__icon">
    <i [class]="iconRight"></i>
  </span>
</button>
